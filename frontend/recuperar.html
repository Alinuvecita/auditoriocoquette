<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/styles.css">

  <title>Recuperar contraseña · Auditorio uni</title>
</head>
<body>

<header class="navbar">
  <div class="container navbar-inner">
    <a class="brand" href="index.html">
      <span class="logo">🎀</span>
      <span>Auditorio uni</span>
    </a>
    <nav class="nav-links">
      <span class="small" data-user-name></span>
      <a href="eventos.html">Eventos</a>
      <a href="historial.html" data-history-link class="hidden">Mis boletos</a>
      <a href="perfil.html" data-profile-link class="hidden">Perfil</a>

      <button data-logout-button class="hidden">Salir</button>
    </nav>

  <main class="form-page">
    <section class="card form-card">
      <span class="badge">Recuperación</span>
      <h1 style="font-size: 2.8rem;">Recuperar contraseña 🔐</h1>
      <p class="lead">Escribe tu correo y te enviaremos un enlace para cambiar tu contraseña.</p>

      <form id="forgotForm">
        <div class="form-group">
          <label for="correo">Correo electrónico</label>
          <input id="correo" type="email" required>
        </div>
        <button class="btn" type="submit">Enviar enlace</button>
      </form>

      <div id="msg" class="hidden"></div>
    </section>
  </main>


<script src="js/config.js"></script>
